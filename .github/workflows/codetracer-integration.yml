name: CodeTracer Integration Tests

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      codetracer_ref:
        description: 'codetracer git ref to test against (default: from the workspace lock)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  codetracer-integration:
    runs-on: [self-hosted, nixos]

    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout codetracer-trace-format
        uses: actions/checkout@v5
        with:
          path: codetracer-trace-format

      - name: Check required secrets
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [[ -z "$TOKEN" ]]; then
            echo "::error::CI_TOKEN_PROVIDER_APP_ID secret is not configured. This secret is required to clone the codetracer repo (which has private submodules). Please add it in the repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Setup Nix and Git authentication
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          nix-github-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.ATTIC_SUBSTITUTER }}
          trusted-public-keys: ${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}

      - name: Checkout metacraft-manifests (workspace locks)
        uses: actions/checkout@v5
        with:
          repository: metacraft-labs/metacraft-manifests
          ref: latest
          path: _manifests
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve cross-repo workspace-lock SHA
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            pull_request) CANDS="${{ github.event.pull_request.base.sha }}" ;;
            push) CANDS="${{ github.sha }} ${{ github.event.before }}" ;;
            *) CANDS="${{ github.sha }}" ;;
          esac
          LOCK_SHA=""
          for c in $CANDS; do
            [ -z "$c" ] && continue
            [ "$c" = "0000000000000000000000000000000000000000" ] && continue
            if "${{ github.workspace }}/codetracer-trace-format/scripts/resolve-sibling-rev.sh" \
                 --repo codetracer-trace-format --sibling codetracer \
                 --manifest-dir "${{ github.workspace }}/_manifests" \
                 --sha "$c" --no-walk >/dev/null 2>&1; then
              LOCK_SHA="$c"; break
            fi
          done
          if [ -z "$LOCK_SHA" ]; then
            echo "::error::No repo-workspaces workspace lock for codetracer-trace-format (candidates: $CANDS). The commit must be published through the workspace tooling."
            exit 1
          fi
          echo "CT_MANIFEST_DIR=${{ github.workspace }}/_manifests" >> "$GITHUB_ENV"
          echo "CT_LOCK_SHA=$LOCK_SHA" >> "$GITHUB_ENV"
          echo "Resolved cross-repo lock SHA for codetracer-trace-format: $LOCK_SHA"

      - name: Resolve codetracer ref
        id: resolve-ref
        shell: bash
        run: |
          # The workflow_dispatch input still overrides; otherwise resolve
          # from the workspace lock.
          if [[ -n "${{ github.event.inputs.codetracer_ref }}" ]]; then
            REF="${{ github.event.inputs.codetracer_ref }}"
          else
            REF="$("${{ github.workspace }}/codetracer-trace-format/scripts/resolve-sibling-rev.sh" \
              --repo codetracer-trace-format --sibling codetracer \
              --manifest-dir "$CT_MANIFEST_DIR" --sha "$CT_LOCK_SHA" --no-walk)"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Resolved codetracer ref: $REF"

      - name: Clone codetracer
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer
          ref: ${{ steps.resolve-ref.outputs.ref }}
          path: codetracer
          gh-token: ${{ steps.app-token.outputs.token }}
          submodules: 'true'

      # codetracer/src/db-backend/build.rs requires a sibling
      # `codetracer-native-recorder` checkout at
      # `<manifest>/../../../codetracer-native-recorder`, i.e. at the same
      # workspace level as the `codetracer/` clone above. Without it the
      # replay-server build panics before the WASM tests can compile.
      - name: Clone codetracer-native-recorder (sibling for db-backend build)
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-native-recorder
          ref: main
          path: codetracer-native-recorder
          gh-token: ${{ steps.app-token.outputs.token }}

      # codetracer_trace_writer_nim/build.rs (in *this* repo, but
      # invoked again here through the codetracer build graph that
      # pulls in this trace-format crate via path = "../codetracer-trace-format/...")
      # needs the codetracer-trace-format-nim sibling for the
      # codetracer_trace_writer_ffi.nim entry point.  Without it the
      # build panics with "Nim FFI entry point not found".  The override
      # env var CODETRACER_TRACE_FORMAT_NIM_DIR is honoured.
      - name: Clone codetracer-trace-format-nim (sibling for trace_writer_nim FFI)
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer-trace-format-nim
          ref: main
          path: codetracer-trace-format-nim
          gh-token: ${{ steps.app-token.outputs.token }}
      - name: Export Nim sibling path
        run: |
          echo "CODETRACER_TRACE_FORMAT_NIM_DIR=${GITHUB_WORKSPACE}/codetracer-trace-format-nim" >> "$GITHUB_ENV"

      # codetracer/src/db-backend/build.rs (line 762) invokes
      # `direnv exec <native-recorder-dir> bash ct_emulator/build_native_api.sh`
      # to compile the Nim MCR emulator's C generation pipeline.  On
      # the self-hosted runners direnv rejects the cloned .envrc as
      # untrusted, so build.rs panics before the emulator C files
      # are emitted.  Pre-allowing the .envrc here makes direnv treat
      # the file as authorized for this checkout; the allow is scoped
      # to the per-job workspace and disappears when the runner cleans
      # up.
      - name: Pre-allow direnv for codetracer-native-recorder
        run: |
          if [[ -f codetracer-native-recorder/.envrc ]]; then
            direnv allow codetracer-native-recorder || true
          fi

      # Strip the NimYAML test/yaml-test-suite sub-submodule. NimYAML's
      # .gitmodules pins it at the dead upstream branch
      # `data-2022-01-17` (yaml/yaml-test-suite no longer publishes that
      # branch), so `git submodule update --recursive` leaves it as an
      # empty directory.  Nix's flake fetcher in the next step walks
      # `?submodules=1` recursively and panics with
      # "does not appear to be a git repository" on that empty dir.
      # The suite is only NimYAML's own test data, never linked against
      # by NimYAML-as-a-library, so dropping it from .gitmodules + the
      # working tree is safe for downstream consumers like codetracer.
      - name: Drop dead yaml-test-suite sub-submodule from NimYAML
        run: |
          set -euo pipefail
          NIMYAML_DIR=codetracer/libs/NimYAML
          if [[ -f "${NIMYAML_DIR}/.gitmodules" ]] \
             && grep -q "test/yaml-test-suite" "${NIMYAML_DIR}/.gitmodules"; then
            cd "${NIMYAML_DIR}"
            git submodule deinit -f test/yaml-test-suite 2>/dev/null || true
            git config -f .gitmodules --remove-section submodule."test/yaml-test-suite" 2>/dev/null || true
            # If .gitmodules ended up with no sections left, remove it
            # entirely so Nix does not try to walk an empty file.
            if [[ ! -s .gitmodules ]] || ! grep -q '\[submodule' .gitmodules; then
              git rm -f .gitmodules 2>/dev/null || rm -f .gitmodules
            else
              git add .gitmodules
            fi
            rm -rf test/yaml-test-suite
            git add -A test/yaml-test-suite 2>/dev/null || true
            git -c user.name="CI" -c user.email="ci@local" commit --no-gpg-sign \
              -m "CI: drop dead yaml-test-suite sub-submodule (upstream branch removed)" || true
            cd - >/dev/null
            # Re-stage NimYAML at codetracer level so the parent repo sees
            # the new commit pointer.
            cd codetracer
            git add libs/NimYAML
            git -c user.name="CI" -c user.email="ci@local" commit --no-gpg-sign \
              -m "CI: bump NimYAML to drop yaml-test-suite sub-submodule" || true
          fi

      - name: Replace trace-format submodule with PR code
        run: |
          rm -rf codetracer/libs/codetracer-trace-format
          cp -r codetracer-trace-format codetracer/libs/codetracer-trace-format
          cd codetracer
          git add libs/codetracer-trace-format
          git -c user.name="CI" -c user.email="ci@local" commit --no-gpg-sign -m "CI: use PR trace-format code" || true

      - name: Run WASM flow integration test
        run: |
          cd codetracer
          nix develop .?submodules=1 --command bash -c '
            set -e
            rustup target add wasm32-wasip1 2>/dev/null || true
            echo "Running WASM flow integration test..."
            cd src/db-backend
            OUTPUT=$(cargo test --test wasm_flow_integration -- --nocapture 2>&1) || { echo "$OUTPUT"; exit 1; }
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "running 0 tests"; then
              echo "ERROR: wasm_flow_integration test binary compiled but no tests ran"
              exit 1
            fi
            echo "WASM flow integration test passed!"
          '

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codetracer-integration-logs
          path: codetracer/target/
          retention-days: 14
          if-no-files-found: ignore
