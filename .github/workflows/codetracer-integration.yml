name: CodeTracer Integration Tests

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      codetracer_ref:
        description: 'codetracer git ref to test against (default: from the workspace lock)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  codetracer-integration:
    runs-on: [self-hosted, nixos]

    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout codetracer-trace-format
        uses: actions/checkout@v5
        with:
          path: codetracer-trace-format

      - name: Check required secrets
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [[ -z "$TOKEN" ]]; then
            echo "::error::CI_TOKEN_PROVIDER_APP_ID secret is not configured. This secret is required to clone the codetracer repo (which has private submodules). Please add it in the repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      # setup-dev-env installs Nix + Git auth and clones the cross-repo
      # siblings this job needs, replacing the former
      # nixos-modules/setup-nix + manifest-checkout + resolve-ref +
      # per-sibling clone-repo steps.
      #
      #   * codetracer            — workflow_dispatch `codetracer_ref`
      #                             override; empty ref (`=`) falls back to
      #                             the workspace lock, matching the old
      #                             resolver behaviour.
      #   * codetracer-native-recorder — required by codetracer's
      #                             db-backend build.rs at a peer location.
      #   * codetracer-trace-format-nim — Nim FFI entry point for
      #                             codetracer_trace_writer_nim's build.rs.
      #
      # The action clones siblings adjacent to ${{ github.workspace }}
      # (i.e. at ${GITHUB_WORKSPACE}/../<name>); downstream steps below
      # reference them through ${SIBLINGS} accordingly. This repo's own
      # checkout stays in the `codetracer-trace-format/` subdir.
      - name: Setup dev env
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.ATTIC_SUBSTITUTER }}
          trusted-public-keys: ${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}
          siblings: |
            codetracer=${{ github.event.inputs.codetracer_ref }}
            codetracer-native-recorder=main
            codetracer-trace-format-nim=main

      # The siblings live at ${GITHUB_WORKSPACE}/../<name>. Expose that
      # parent directory once so the remaining steps can address each
      # sibling without repeating the `..` traversal, and point the Nim
      # FFI override at the trace-format-nim clone.
      - name: Export sibling paths
        run: |
          SIBLINGS="$(cd "${GITHUB_WORKSPACE}/.." && pwd)"
          echo "SIBLINGS=${SIBLINGS}" >> "$GITHUB_ENV"
          echo "CODETRACER_TRACE_FORMAT_NIM_DIR=${SIBLINGS}/codetracer-trace-format-nim" >> "$GITHUB_ENV"

      # codetracer/src/db-backend/build.rs (line 762) invokes
      # `direnv exec <native-recorder-dir> bash ct_emulator/build_native_api.sh`
      # to compile the Nim MCR emulator's C generation pipeline.  On
      # the self-hosted runners direnv rejects the cloned .envrc as
      # untrusted, so build.rs panics before the emulator C files
      # are emitted.  Pre-allowing the .envrc here makes direnv treat
      # the file as authorized for this checkout; the allow is scoped
      # to the per-job workspace and disappears when the runner cleans
      # up.
      - name: Pre-allow direnv for codetracer-native-recorder
        run: |
          if [[ -f "${SIBLINGS}/codetracer-native-recorder/.envrc" ]]; then
            direnv allow "${SIBLINGS}/codetracer-native-recorder" || true
          fi

      # Strip the NimYAML test/yaml-test-suite sub-submodule. NimYAML's
      # .gitmodules pins it at the dead upstream branch
      # `data-2022-01-17` (yaml/yaml-test-suite no longer publishes that
      # branch), so `git submodule update --recursive` leaves it as an
      # empty directory.  Nix's flake fetcher in the next step walks
      # `?submodules=1` recursively and panics with
      # "does not appear to be a git repository" on that empty dir.
      # The suite is only NimYAML's own test data, never linked against
      # by NimYAML-as-a-library, so dropping it from .gitmodules + the
      # working tree is safe for downstream consumers like codetracer.
      - name: Drop dead yaml-test-suite sub-submodule from NimYAML
        run: |
          set -euo pipefail
          NIMYAML_DIR="${SIBLINGS}/codetracer/libs/NimYAML"
          if [[ -f "${NIMYAML_DIR}/.gitmodules" ]] \
             && grep -q "test/yaml-test-suite" "${NIMYAML_DIR}/.gitmodules"; then
            cd "${NIMYAML_DIR}"
            git submodule deinit -f test/yaml-test-suite 2>/dev/null || true
            git config -f .gitmodules --remove-section submodule."test/yaml-test-suite" 2>/dev/null || true
            # If .gitmodules ended up with no sections left, remove it
            # entirely so Nix does not try to walk an empty file.
            if [[ ! -s .gitmodules ]] || ! grep -q '\[submodule' .gitmodules; then
              git rm -f .gitmodules 2>/dev/null || rm -f .gitmodules
            else
              git add .gitmodules
            fi
            rm -rf test/yaml-test-suite
            git add -A test/yaml-test-suite 2>/dev/null || true
            git -c user.name="CI" -c user.email="ci@local" commit --no-gpg-sign \
              -m "CI: drop dead yaml-test-suite sub-submodule (upstream branch removed)" || true
            cd - >/dev/null
            # Re-stage NimYAML at codetracer level so the parent repo sees
            # the new commit pointer.
            cd "${SIBLINGS}/codetracer"
            git add libs/NimYAML
            git -c user.name="CI" -c user.email="ci@local" commit --no-gpg-sign \
              -m "CI: bump NimYAML to drop yaml-test-suite sub-submodule" || true
          fi

      - name: Replace trace-format submodule with PR code
        run: |
          rm -rf "${SIBLINGS}/codetracer/libs/codetracer-trace-format"
          cp -r "${GITHUB_WORKSPACE}/codetracer-trace-format" "${SIBLINGS}/codetracer/libs/codetracer-trace-format"
          cd "${SIBLINGS}/codetracer"
          git add libs/codetracer-trace-format
          git -c user.name="CI" -c user.email="ci@local" commit --no-gpg-sign -m "CI: use PR trace-format code" || true

      # This step builds the *sibling* codetracer repo via its own flake's
      # dev env (`nix develop` in codetracer/), not this repo's, so it is
      # intentionally not routed through `dev-exec`.
      - name: Run WASM flow integration test
        run: |
          cd "${SIBLINGS}/codetracer"
          nix develop .?submodules=1 --command bash -c '
            set -e
            rustup target add wasm32-wasip1 2>/dev/null || true
            echo "Running WASM flow integration test..."
            cd src/db-backend
            OUTPUT=$(cargo test --test wasm_flow_integration -- --nocapture 2>&1) || { echo "$OUTPUT"; exit 1; }
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "running 0 tests"; then
              echo "ERROR: wasm_flow_integration test binary compiled but no tests ran"
              exit 1
            fi
            echo "WASM flow integration test passed!"
          '

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codetracer-integration-logs
          path: ../codetracer/target/
          retention-days: 14
          if-no-files-found: ignore
