name: CodeTracer Integration Tests

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      codetracer_ref:
        description: 'codetracer git ref to test against (default: from sibling-pins.json)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  codetracer-integration:
    runs-on: [self-hosted, nixos]

    steps:
      - name: Checkout codetracer-trace-format
        uses: actions/checkout@v5
        with:
          path: codetracer-trace-format

      - name: Check required secrets
        run: |
          TOKEN="${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}"
          if [[ -z "$TOKEN" ]]; then
            echo "::error::GH_READ_METACRAFT_PRIVATE_REPOS secret is not configured. This secret is required to clone the codetracer repo (which has private submodules). Please add it in the repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Setup Nix and Git authentication
        uses: metacraft-labs/metacraft-github-actions/setup-nix@main
        with:
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}

      - name: Resolve codetracer ref
        id: resolve-ref
        run: |
          PINS="codetracer-trace-format/.github/sibling-pins.json"
          if [[ -n "${{ github.event.inputs.codetracer_ref }}" ]]; then
            REF="${{ github.event.inputs.codetracer_ref }}"
          elif [[ -f "$PINS" ]]; then
            REF=$(grep '"codetracer"' "$PINS" | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          fi
          REF="${REF:-main}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Resolved codetracer ref: $REF"

      - name: Clone codetracer
        uses: metacraft-labs/metacraft-github-actions/clone-repo@main
        with:
          repo: metacraft-labs/codetracer
          ref: ${{ steps.resolve-ref.outputs.ref }}
          path: codetracer
          gh-token: ${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}
          submodules: 'true'

      - name: Replace trace-format submodule with PR code
        run: |
          rm -rf codetracer/libs/codetracer-trace-format
          cp -r codetracer-trace-format codetracer/libs/codetracer-trace-format
          cd codetracer
          git add libs/codetracer-trace-format
          git -c user.name="CI" -c user.email="ci@local" commit --no-gpg-sign -m "CI: use PR trace-format code" || true

      - name: Run WASM flow integration test
        run: |
          cd codetracer
          nix develop .?submodules=1 --command bash -c '
            set -e
            rustup target add wasm32-wasip1 2>/dev/null || true
            echo "Running WASM flow integration test..."
            cd src/db-backend
            OUTPUT=$(cargo test --test wasm_flow_integration -- --nocapture 2>&1) || { echo "$OUTPUT"; exit 1; }
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "running 0 tests"; then
              echo "ERROR: wasm_flow_integration test binary compiled but no tests ran"
              exit 1
            fi
            echo "WASM flow integration test passed!"
          '

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codetracer-integration-logs
          path: codetracer/target/
          retention-days: 14
          if-no-files-found: ignore
