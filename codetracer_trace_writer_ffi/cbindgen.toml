language = "C"
include_guard = "CODETRACER_TRACE_WRITER_H"
header = "/* Generated by cbindgen — do not edit manually. */"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify this manually. */"
tab_width = 4
style = "both"

[export]
include = [
    "TraceWriterHandle",
    "FfiTraceFormat",
    "FfiTypeKind",
    "FfiEventLogKind",
]

# Short C-side names so that prefix_with_name produces compact prefixed
# constants (e.g. TK_ERROR, ELK_ERROR) and avoids the flat-namespace
# collision between FfiTypeKind::Error and FfiEventLogKind::Error.
[export.rename]
"FfiTraceFormat" = "Fmt"
"FfiTypeKind" = "Tk"
"FfiEventLogKind" = "Elk"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true
